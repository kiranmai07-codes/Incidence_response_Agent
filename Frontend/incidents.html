<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Incidents — IRA</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-noise"></div>

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><span class="logo-pulse"></span><i class="fa-solid fa-shield-halved"></i></div>
      <div class="logo-text"><span class="logo-title">IRA</span><span class="logo-sub">Incident Response</span></div>
    </div>
    <!-- <nav class="sidebar-nav">
      <a href="home.html" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="index.html" class="nav-item"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
      <a href="incidents.html" class="nav-item active"><i class="fa-solid fa-triangle-exclamation"></i><span>Incidents</span><span class="nav-badge" id="nav-open-count">0</span></a>
      <a href="agent.html" class="nav-item"><i class="fa-solid fa-robot"></i><span>AI Agent</span><span class="nav-badge new">AI</span></a>
      <a href="analytics.html" class="nav-item"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a>
      <a href="settings.html" class="nav-item"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-status"><div class="status-dot active"></div><span>Agent Active</span></div> -->
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><i class="fa-solid fa-house"></i><span>Home</span></a>
      <a href="/dashboard" class="nav-item"><i class="fa-solid fa-gauge-high"></i><span>Dashboard</span></a>
      <a href="/incidents" class="nav-item active"><i class="fa-solid fa-triangle-exclamation"></i><span>Incidents</span><span class="nav-badge" id="nav-open-count">0</span></a>
      <a href="/agent" class="nav-item"><i class="fa-solid fa-robot"></i><span>AI Agent</span><span class="nav-badge new">AI</span></a>
      <a href="/analytics" class="nav-item"><i class="fa-solid fa-chart-line"></i><span>Analytics</span></a>
      <a href="/settings" class="nav-item"><i class="fa-solid fa-gear"></i><span>Settings</span></a>
    </nav>
    <div class="sidebar-status"><div class="status-dot active"></div><span>Agent Active</span></div>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
      <div class="topbar-title"><h1>All Incidents</h1><span class="topbar-time" id="live-time"></span></div>
      <div class="topbar-actions">
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" placeholder="Search incidents..." id="global-search" oninput="filterIncidents(this.value)"/>
        </div>
        <button class="btn-alert" id="alert-bell" onclick="toggleAlertPanel()">
          <i class="fa-solid fa-bell"></i>
          <span class="bell-badge" id="bell-count">3</span>
        </button>
        <button class="btn-primary" onclick="openCreateModal()"><i class="fa-solid fa-plus"></i> New Incident</button>
      </div>
    </header>

    <div class="alert-panel" id="alert-panel">
      <div class="alert-panel-header"><span>Recent Alerts</span><button onclick="toggleAlertPanel()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="alert-list" id="alert-list"></div>
    </div>

    <!-- Filters Bar -->
    <section class="filters-bar">
      <div class="filter-chips" id="filter-chips">
        <button class="chip active" onclick="setChip(this,'all')">All</button>
        <button class="chip" onclick="setChip(this,'open')"><span class="chip-dot open"></span>Open</button>
        <button class="chip" onclick="setChip(this,'in-progress')"><span class="chip-dot progress"></span>In Progress</button>
        <button class="chip" onclick="setChip(this,'resolved')"><span class="chip-dot resolved"></span>Resolved</button>
      </div>
      <div class="filter-right">
        <select id="sev-filter" onchange="applyFiltersPage()">
          <option value="all">All Severity</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <select id="cat-filter" onchange="applyFiltersPage()">
          <option value="all">All Categories</option>
          <option value="infrastructure">Infrastructure</option>
          <option value="security">Security</option>
          <option value="application">Application</option>
          <option value="network">Network</option>
          <option value="database">Database</option>
        </select>
        <button class="btn-ghost" onclick="exportCSV()"><i class="fa-solid fa-file-export"></i> Export</button>
      </div>
    </section>

    <!-- Incidents Grid -->
    <section class="incidents-grid" id="incidents-grid"></section>

    <div class="pagination" id="pagination"></div>
  </main>

  <!-- Create Incident Modal -->
  <div class="modal-overlay" id="create-modal" onclick="closeModalOutside(event)">
    <div class="modal">
      <div class="modal-header"><h2>Create New Incident</h2><button class="modal-close" onclick="closeCreateModal()"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-body">
        <div class="form-group"><label>Incident Title *</label><input type="text" id="inc-title" placeholder="e.g. Database connection timeout"/></div>
        <div class="form-row">
          <div class="form-group"><label>Severity *</label><select id="inc-severity"><option value="critical">🔴 Critical</option><option value="high">🟠 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select></div>
          <div class="form-group"><label>Category *</label><select id="inc-category"><option value="infrastructure">Infrastructure</option><option value="security">Security</option><option value="application">Application</option><option value="network">Network</option><option value="database">Database</option></select></div>
        </div>
        <div class="form-group"><label>Description</label><textarea id="inc-desc" rows="3" placeholder="Describe the incident..."></textarea></div>
        <div class="form-group"><label>Assigned To</label><input type="text" id="inc-assignee" placeholder="Engineer name or team"/></div>
        <div class="form-check"><input type="checkbox" id="inc-ai-analyze" checked/><label for="inc-ai-analyze"><i class="fa-solid fa-robot"></i> Auto-analyze with AI Agent</label></div>
      </div>
      <div class="modal-footer">
        <button class="btn-ghost" onclick="closeCreateModal()">Cancel</button>
        <button class="btn-primary" onclick="createIncident()"><i class="fa-solid fa-plus"></i> Create Incident</button>
      </div>
    </div>
  </div>

  <!-- Incident Detail Modal -->
  <div class="modal-overlay" id="detail-modal" onclick="closeDetailOutside(event)">
    <div class="modal modal-large">
      <div class="modal-header">
        <div>
          <h2 id="detail-title">Incident Title</h2>
          <span id="detail-id" style="font-size:12px;color:var(--text-muted);font-family:var(--font-mono)"></span>
        </div>
        <button class="modal-close" onclick="closeDetailModal()"><i class="fa-solid fa-xmark"></i></button>
      </div>
      <div class="modal-body">
        <div class="detail-meta" id="detail-meta"></div>
        <div class="detail-desc-box">
          <label>Description</label>
          <p id="detail-desc"></p>
        </div>
        <div class="ai-response-box" id="ai-response-box">
          <div class="ai-response-header">
            <i class="fa-solid fa-robot"></i> AI Agent Analysis
            <span class="ai-thinking" id="ai-thinking"><span></span><span></span><span></span></span>
          </div>
          <div id="ai-response-content" class="ai-response-content">Analyzing incident...</div>
        </div>
        <div class="detail-actions-row">
          <button class="btn-primary" onclick="analyzeWithAI()"><i class="fa-solid fa-robot"></i> Re-analyze</button>
          <button class="btn-success" onclick="resolveIncident()"><i class="fa-solid fa-check"></i> Mark Resolved</button>
          <button class="btn-danger" onclick="deleteIncident()"><i class="fa-solid fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="app.js"></script>
  <script src="incidents-page.js"></script>
</body>
</html>
