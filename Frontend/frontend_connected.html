<!DOCTYPE html>
<html>
<head>
    <title>IRA - Connected</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        button { background: #1a2a4f; color: white; padding: 8px 16px; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        .badge { padding: 3px 8px; border-radius: 12px; font-size: 11px; }
        .badge-critical { background: #fee2e2; color: #dc2626; }
        .badge-high { background: #ffedd5; color: #f97316; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; width: 400px; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0; border: 1px solid #ddd; border-radius: 5px; }
        .status { padding: 5px 10px; border-radius: 5px; display: inline-block; }
        .status-online { background: #22c55e; color: white; }
        .status-offline { background: #ef4444; color: white; }
    </style>
</head>
<body>

<h1>🛡️ IRA - Incident Response Agent</h1>

<div class="card">
    <div id="backendStatus">🔌 Checking backend connection...</div>
    <button onclick="loadIncidents()">🔄 Refresh Data</button>
    <button onclick="openModal()">+ New Incident</button>
</div>

<div class="card">
    <h3>📋 Incidents</h3>
    <table id="incidentTable">
        <thead><tr><th>ID</th><th>Title</th><th>Severity</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="incidentList"></tbody>
    </table>
</div>

<!-- Modal -->
<div id="modal" class="modal">
    <div class="modal-content">
        <h3>Create Incident</h3>
        <input type="text" id="title" placeholder="Title">
        <select id="severity">
            <option value="critical">Critical</option>
            <option value="high">High</option>
            <option value="medium">Medium</option>
            <option value="low">Low</option>
        </select>
        <select id="category">
            <option value="Database">Database</option>
            <option value="Application">Application</option>
            <option value="Security">Security</option>
        </select>
        <input type="text" id="assignee" placeholder="Assignee">
        <button onclick="createIncident()">Create</button>
        <button onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:5000/api';
    let incidents = [];

    // Check backend connection
    async function checkBackend() {
        const statusDiv = document.getElementById('backendStatus');
        try {
            const response = await fetch(`${API_URL}/incidents`);
            if (response.ok) {
                statusDiv.innerHTML = '✅ Backend Connected! Data loaded from server.';
                await loadIncidents();
            } else {
                throw new Error('Backend error');
            }
        } catch (error) {
            statusDiv.innerHTML = '❌ Backend NOT connected. Make sure to run: python app.py';
        }
    }

    // Load incidents from backend
    async function loadIncidents() {
        try {
            const response = await fetch(`${API_URL}/incidents`);
            const data = await response.json();
            incidents = data.incidents;
            renderTable();
        } catch (error) {
            console.error('Error loading:', error);
        }
    }

    // Render table
    function renderTable() {
        const tbody = document.getElementById('incidentList');
        if (!incidents.length) {
            tbody.innerHTML = '<tr><td colspan="5">No incidents</td></tr>';
            return;
        }
        
        tbody.innerHTML = incidents.map(inc => `
            <tr>
                <td>${inc.id}</td>
                <td>${inc.title}</td>
                <td><span class="badge badge-${inc.severity}">${inc.severity}</span></td>
                <td>${inc.status}</td>
                <td>
                    ${inc.status !== 'resolved' ? `<button onclick="resolveIncident('${inc.id}')">✓ Resolve</button>` : ''}
                    <button onclick="deleteIncident('${inc.id}')">🗑️ Delete</button>
                </td>
            </tr>
        `).join('');
    }

    // Create incident
    async function createIncident() {
        const newIncident = {
            title: document.getElementById('title').value,
            severity: document.getElementById('severity').value,
            category: document.getElementById('category').value,
            assignee: document.getElementById('assignee').value
        };
        
        try {
            const response = await fetch(`${API_URL}/incidents`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(newIncident)
            });
            if (response.ok) {
                await loadIncidents();
                closeModal();
                alert('Incident created!');
            }
        } catch (error) {
            alert('Error creating incident');
        }
    }

    // Resolve incident
    async function resolveIncident(id) {
        try {
            await fetch(`${API_URL}/incidents/${id}`, { method: 'PUT' });
            await loadIncidents();
            alert('Incident resolved!');
        } catch (error) {
            alert('Error resolving');
        }
    }

    // Delete incident
    async function deleteIncident(id) {
        if (confirm('Delete this incident?')) {
            try {
                await fetch(`${API_URL}/incidents/${id}`, { method: 'DELETE' });
                await loadIncidents();
                alert('Incident deleted!');
            } catch (error) {
                alert('Error deleting');
            }
        }
    }

    function openModal() {
        document.getElementById('modal').style.display = 'flex';
    }
    
    function closeModal() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('title').value = '';
        document.getElementById('assignee').value = '';
    }

    // Start
    checkBackend();
</script>
</body>
</html>
